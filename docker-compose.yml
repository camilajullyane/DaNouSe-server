services:
  dns-server:
    build:
      context: .
    environment:
      DNS_REGISTER_TOKEN: ${DNS_REGISTER_TOKEN:-change-me}
      DATABASE_URL: file:/app/data/dev.db
      HEALTH_CHECK_INTERVAL_MS: ${HEALTH_CHECK_INTERVAL_MS:-10000}
      HEALTH_CHECK_TIMEOUT_MS: ${HEALTH_CHECK_TIMEOUT_MS:-2000}
      HEALTH_CHECK_FAILURE_THRESHOLD: ${HEALTH_CHECK_FAILURE_THRESHOLD:-2}
    ports:
      - "5300:5300/udp"
    volumes:
      - dns-data:/app/data
    restart: unless-stopped

volumes:
  dns-data:
